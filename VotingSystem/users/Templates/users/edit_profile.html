<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | VoteSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass-card {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.9);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.8);
        }

        .abstract-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        #avatar-preview-img {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6366f1' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 min-h-screen">

    <!-- Theme Switcher -->
    <div class="fixed top-6 right-6 z-50">
        <button id="theme-toggle" class="p-3 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-lg hover:scale-110 transition-all text-slate-700 dark:text-amber-500">
            <i data-lucide="moon" id="theme-icon-dark" class="w-5 h-5"></i>
            <i data-lucide="sun" id="theme-icon-light" class="w-5 h-5 hidden"></i>
        </button>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="animate-in glass-card border border-white dark:border-slate-800 rounded-[2.5rem] shadow-2xl overflow-hidden">
            
            <!-- Header with Abstract Avatar -->
            <div class="bg-slate-100/50 dark:bg-slate-900/50 p-8 sm:p-12 flex flex-col sm:flex-row items-center gap-8 border-b border-slate-200 dark:border-slate-800">
                <div class="relative group">
                    <div class="w-32 h-32 sm:w-40 sm:h-40 rounded-3xl abstract-gradient p-1 shadow-2xl transition-transform group-hover:scale-[1.02]">
                        <div id="avatar-container" class="w-full h-full rounded-[1.3rem] bg-slate-900 overflow-hidden flex items-center justify-center relative">
                            <!-- Default Abstract Content -->
                            <div id="default-avatar-content" class="absolute inset-0 flex items-center justify-center">
                                <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="opacity-40">
                                    <circle cx="50" cy="50" r="30" stroke="white" stroke-width="0.5"/>
                                    <path d="M20 20L80 80M80 20L20 80" stroke="white" stroke-width="0.5"/>
                                    <rect x="25" y="25" width="50" height="50" stroke="white" stroke-width="0.5" transform="rotate(45 50 50)"/>
                                </svg>
                                <i data-lucide="shapes" class="absolute w-12 h-12 text-white/80"></i>
                            </div>
                            <!-- Image Preview Element (Hidden by default) -->
                            <img id="avatar-preview-img" class="hidden" src="" alt="Profile Preview">
                        </div>
                    </div>
                    <label for="profile_pic" class="absolute -bottom-2 -right-2 p-3 bg-primary text-white rounded-xl shadow-xl cursor-pointer hover:bg-indigo-500 transition-colors border-4 border-white dark:border-slate-900">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                        <input type="file" id="profile_pic" class="hidden" accept="image/*">
                    </label>
                </div>

                <div class="text-center sm:text-left flex-1">
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white">Account Settings</h1>
                    <div class="mt-3 flex flex-wrap justify-center sm:justify-start gap-4 text-sm font-medium">
                        <span class="flex items-center gap-1.5 text-slate-500 dark:text-slate-400">
                            <i data-lucide="calendar" class="w-4 h-4 text-indigo-500"></i>
                            Created: <span class="text-slate-700 dark:text-slate-200">Oct 12, 2023</span>
                        </span>
                        <span class="flex items-center gap-1.5 text-slate-500 dark:text-slate-400">
                            <i data-lucide="refresh-cw" class="w-4 h-4 text-emerald-500"></i>
                            Updated: <span class="text-slate-700 dark:text-slate-200" id="update-time">2 hours ago</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Profile Form -->
            <form id="profile-form" class="p-8 sm:p-12 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Full Name Field -->
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <i data-lucide="user" class="w-5 h-5"></i>
                            </div>
                            <input type="text" name="fullname" class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white font-medium" placeholder="John Doe">
                        </div>
                    </div>

                    <!-- Username Field -->
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Username</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <i data-lucide="at-sign" class="w-5 h-5"></i>
                            </div>
                            <input type="text" name="username" class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white font-medium" placeholder="johndoe99">
                        </div>
                    </div>

                    <!-- Email Field (Read Only Style) -->
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
                        <div class="relative group opacity-70">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="mail" class="w-5 h-5"></i>
                            </div>
                            <input type="email" name="email" readonly class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-2xl cursor-not-allowed text-slate-500 font-medium" value="john@example.com">
                        </div>
                    </div>

                    <!-- Location Field -->
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Location</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <i data-lucide="map-pin" class="w-5 h-5"></i>
                            </div>
                            <input type="text" 
                                   name="location" 
                                   maxlength="150"
                                   class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white font-medium" 
                                   placeholder="e.g. London, UK"
                                   value="San Francisco, CA">
                        </div>
                    </div>
                </div>

                <!-- Bio Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-end px-1">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Bio</label>
                        <span id="char-count" class="text-xs font-medium text-slate-400">0 / 300</span>
                    </div>
                    <div class="relative group">
                        <textarea name="bio" 
                                  id="bio-textarea"
                                  maxlength="300" 
                                  rows="4" 
                                  class="w-full p-5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white font-medium resize-none" 
                                  placeholder="Tell us about yourself..."></textarea>
                    </div>
                </div>

                <!-- Submit Section -->
                <div class="flex flex-col sm:flex-row items-center gap-4 pt-4">
                    <button type="submit" class="w-full sm:flex-[2] bg-primary hover:bg-indigo-500 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                        <i data-lucide="save" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                        Save Changes
                    </button>
                    <button type="button" class="w-full sm:flex-1 py-5 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-2xl hover:bg-slate-300 dark:hover:bg-slate-700 transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl translate-y-32 opacity-0 transition-all duration-500 z-50">
        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
        <span class="font-bold text-sm">Profile updated successfully!</span>
    </div>

    <script>
        lucide.createIcons();

        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('theme-icon-light');
        const moonIcon = document.getElementById('theme-icon-dark');

        const applyTheme = (isDark) => {
            if (isDark) {
                document.documentElement.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        };
        
        let isDarkMode = localStorage.getItem('theme') === 'dark';
        applyTheme(isDarkMode);

        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            applyTheme(isDarkMode);
        });

        // Bio Character Counter
        const bioTextarea = document.getElementById('bio-textarea');
        const charCount = document.getElementById('char-count');
        bioTextarea.addEventListener('input', () => {
            const count = bioTextarea.value.length;
            charCount.textContent = `${count} / 300`;
            charCount.classList.toggle('text-rose-500', count >= 300);
        });

        // Live Image Preview Logic
        const profileInput = document.getElementById('profile_pic');
        const previewImg = document.getElementById('avatar-preview-img');
        const defaultAvatarContent = document.getElementById('default-avatar-content');

        profileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    // Update preview image source
                    previewImg.src = event.target.result;
                    
                    // Toggle visibility: Show image, hide abstract pattern
                    previewImg.classList.remove('hidden');
                    defaultAvatarContent.classList.add('hidden');
                    
                    // Optional: Show success hint
                    showToast("New photo ready to save!");
                }
                
                reader.readAsDataURL(file);
            }
        });

        // Toast Helper
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = toast.querySelector('span');
            toastText.textContent = message;
            
            toast.classList.remove('translate-y-32', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-32', 'opacity-0');
            }, 3000);
        }

        // Handle Form Submission
        document.getElementById('profile-form').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast("Profile updated successfully!");
            document.getElementById('update-time').textContent = "Just now";
        });
    </script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteSphere | Secure Reset</title>
        <!-- Tailwind CSS CDN -->
        <script src="{% static 'home/links/tailwind.css' %}"></script>
        <!-- Lucide Icons -->
        <script src="{% static 'home/links/lucid.js' %}"></script>
    <style>
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-float { animation: float 8s ease-in-out infinite; }
        .animate-slide-up { animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .glass { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.7); }
        .dark .glass { background: rgba(15, 23, 42, 0.6); }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center p-4 transition-colors duration-500 overflow-hidden font-sans">
    
    <!-- Background Accents -->
    <div class="fixed top-[-15%] left-[-10%] w-[50%] h-[50%] bg-indigo-500/10 rounded-full blur-[100px] animate-float"></div>
    <div class="fixed bottom-[-15%] right-[-10%] w-[50%] h-[50%] bg-fuchsia-500/10 rounded-full blur-[100px] animate-float" style="animation-delay: -4s"></div>

    <!-- Theme Toggle -->
    <button onclick="document.documentElement.classList.toggle('dark')" class="fixed top-6 right-6 p-2.5 rounded-xl bg-white dark:bg-slate-900 shadow-lg border border-slate-200 dark:border-slate-800 z-50 hover:scale-110 active:scale-95 transition-all text-slate-600 dark:text-slate-300">
        <i data-lucide="sun" class="hidden dark:block w-5 h-5"></i>
        <i data-lucide="moon" class="dark:hidden w-5 h-5"></i>
    </button>

    <div class="animate-slide-up w-full max-w-md relative z-10">
        <div class="glass border border-white/40 dark:border-slate-800/50 p-8 rounded-3xl shadow-2xl">
            <header class="text-center mb-8">
                <div class="w-14 h-14 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4 border border-primary/20">
                    <i data-lucide="shield-check" class="w-7 h-7"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Reset Password</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Enter a strong new password</p>
            </header>

            <form class="space-y-4" method="POST">
                {% csrf_token %}
                <!-- New Password -->
                <div class="group">
                    <label class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider ml-1 mb-1.5 block group-focus-within:text-primary">New Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" name="password" id="p1" required class="w-full pl-11 pr-12 py-3.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" placeholder="••••••••">
                        <button type="button" onclick="toggle('p1', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="group">
                    <label class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider ml-1 mb-1.5 block group-focus-within:text-primary">Confirm</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                        </span>
                        <input type="password" name="confirm_password" id="p2" required class="w-full pl-11 pr-12 py-3.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white" placeholder="••••••••">
                        <button type="button" onclick="toggle('p2', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Indicators -->
                <div class="grid grid-cols-2 gap-2 px-1 py-1">
                    <div id="v1" class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase">
                        <i data-lucide="circle" class="w-3 h-3"></i> 8+ Characters
                    </div>
                    <div id="v2" class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase">
                        <i data-lucide="circle" class="w-3 h-3"></i> Passwords Match
                    </div>
                </div>

                <button type="submit" class="w-full py-3.5 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/40 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Update Password
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const toggle = (id, btn) => { 
            const el = document.getElementById(id); 
            const isPass = el.type === 'password';
            el.type = isPass ? 'text' : 'password';
            
            // Update icon dynamically
            const iconName = isPass ? 'eye-off' : 'eye';
            btn.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i>`;
            lucide.createIcons();
        };
        
       
    </script>
</body>
</html>

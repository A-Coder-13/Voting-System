<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteSphere | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
                        'fade-in': 'fadeIn 0.4s ease-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Dark Mode CSS Toggle Logic */
        #theme-toggle:checked ~ .app-container { background-color: rgb(2 6 23); color: white; }
        #theme-toggle:checked ~ .app-container .glass-card { background-color: rgba(15, 23, 42, 0.8); border-color: rgba(255, 255, 255, 0.1); }
        #theme-toggle:checked ~ .app-container .input-field { background-color: rgba(2, 6, 23, 0.6); border-color: rgba(255, 255, 255, 0.1); color: white; }
        #theme-toggle:checked ~ .app-container .text-slate-500 { color: #94a3b8; }
        #theme-toggle:checked ~ .app-container .text-slate-900 { color: #f8fafc; }
        
        /* Icon visibility based on theme toggle */
        #theme-toggle:checked ~ .app-container .sun-icon { display: block; }
        #theme-toggle:checked ~ .app-container .moon-icon { display: none; }
        #theme-toggle:not(:checked) ~ .app-container .sun-icon { display: none; }
        #theme-toggle:not(:checked) ~ .app-container .moon-icon { display: block; }

        .glass-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="antialiased">

    <!-- HIDDEN CONTROLLERS -->
    <input type="checkbox" id="theme-toggle" class="hidden">

    <div class="app-container min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-slate-50 transition-colors duration-500">
        
        <!-- Animated Background Blobs -->
        <div class="absolute top-0 left-0 w-full h-full -z-10 overflow-hidden">
            <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-indigo-500/10 rounded-full blur-[120px] animate-pulse"></div>
            <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-violet-500/10 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s"></div>
        </div>

        <!-- Theme Switcher -->
        <div class="fixed top-8 right-8 z-50">
            <label for="theme-toggle" class="cursor-pointer p-4 rounded-2xl bg-white dark:bg-slate-800 shadow-xl border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:scale-110 active:scale-95 transition-all group">
                <span class="moon-icon"><i data-lucide="moon" class="w-5 h-5 text-indigo-600"></i></span>
                <span class="sun-icon"><i data-lucide="sun" class="w-5 h-5 text-yellow-400"></i></span>
            </label>
        </div>

        <div class="max-w-md w-full relative z-10 animate-fade-in">
            
            <!-- Breadcrumb Navigation -->
            <div class="flex items-center gap-4 mb-8">
                <a href="#" class="inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 hover:text-indigo-600 transition-colors group">
                    <i data-lucide="chevron-left" class="w-4 h-4 transition-transform group-hover:-translate-x-1"></i>
                    Identity Gate
                </a>
            </div>

            <div class="relative">
                
                <!-- STEP 1: EMAIL ENTRY -->
                <div id="step-email" class="glass-card bg-white/70 backdrop-blur-3xl border border-white/40 rounded-[3rem] p-8 md:p-12 shadow-[0_40px_80px_-15px_rgba(0,0,0,0.1)]">
                    <div class="flex flex-col items-center text-center mb-10">
                        <div class="w-20 h-20 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-[2.5rem] flex items-center justify-center shadow-2xl shadow-indigo-500/40 mb-8 animate-float">
                            <i data-lucide="key-round" class="w-8 h-8 text-white"></i>
                        </div>
                        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-3">Recovery</h1>
                        <p class="text-sm text-slate-500 font-medium">Verify your registered email to receive an access token.</p>
                    </div>

                    <form class="space-y-6" onsubmit="event.preventDefault()">
                        <div class="space-y-2 group">
                            <label class="block text-[10px] font-black uppercase tracking-[0.25em] text-slate-400 px-2 group-focus-within:text-indigo-500 transition-colors">System Email</label>
                            <div class="relative">
                                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400">
                                    <i data-lucide="mail" class="w-4 h-4"></i>
                                </span>
                                <input type="email" placeholder="admin@votesphere.io" class="input-field w-full bg-white border border-slate-200 pl-14 pr-6 py-5 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-bold text-sm">
                            </div>
                        </div>

                        <button type="submit" class="w-full flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl shadow-indigo-500/30 hover:-translate-y-1 active:scale-95">
                            Issue OTP Token
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </form>
                </div>

            </div>

            <!-- Footer -->
            <footer class="mt-16 text-center">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-[0.5em] opacity-60">
                    &copy; MMXXIV VoteSphere Operations
                </p>
            </footer>

        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Optional: Re-initialize on dynamic changes if needed
        document.getElementById('theme-toggle').addEventListener('change', () => {
            // Theme toggle is handled by CSS, but you could trigger JS logic here
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteSphere | Secure Authorization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* Glass Morphism */
        .glass-morphism {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
        }
        .dark .glass-morphism {
            background: rgba(15, 23, 42, 0.85);
        }

        /* Entrance Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animate-card { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .otp-stagger { 
            opacity: 0;
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* Floating Background Decor */
        .animate-float { animation: float 8s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -20px); }
        }

        /* Interactive Elements */
        .otp-input:focus { 
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
        }
        
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 dark:bg-slate-950 transition-colors duration-500 min-h-screen flex items-center justify-center p-4">

    <!-- Theme Switcher -->
    <div class="fixed top-6 right-6 z-50">
        <button id="theme-toggle" class="p-3 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-xl hover:rotate-12 transition-all active:scale-95">
            <i data-lucide="moon" id="theme-icon-dark" class="w-6 h-6 text-slate-700 hidden"></i>
            <i data-lucide="sun" id="theme-icon-light" class="w-6 h-6 text-amber-500 hidden"></i>
        </button>
    </div>

    <div class="max-w-md w-full relative">
        <!-- Floating Decor -->
        <div class="absolute -top-32 -left-32 w-80 h-80 bg-indigo-500/20 rounded-full blur-[80px] animate-float"></div>
        <div class="absolute -bottom-32 -right-32 w-80 h-80 bg-purple-500/20 rounded-full blur-[80px] animate-float" style="animation-delay: -4s"></div>

        <div class="animate-card glass-morphism relative border border-white/20 dark:border-slate-800/50 rounded-[2.5rem] shadow-2xl p-8 sm:p-12 overflow-hidden opacity-0">
            <!-- Top Pattern -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
            
            <div class="text-center mb-10">
                <div class="relative inline-flex mb-6">
                    <div class="absolute inset-0 bg-primary/20 rounded-2xl blur-xl animate-pulse"></div>
                    <div class="relative flex items-center justify-center w-16 h-16 bg-primary rounded-2xl shadow-lg shadow-indigo-500/30 transform hover:rotate-12 transition-transform duration-500">
                        <!-- JS Icon: Lock -->
                        <i data-lucide="lock-keyhole" class="w-8 h-8 text-white"></i>
                    </div>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Enter OTP</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Verification code sent to your device</p>
            </div>

            <form class="space-y-8" id="otp-form" method="POST">
                {% csrf_token %}
                <div class="flex justify-between gap-2">
                    <input type="text" maxlength="1" class="otp-stagger otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none text-slate-900 dark:text-white" style="animation-delay: 0.1s" required>
                    <input type="text" maxlength="1" class="otp-stagger otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none text-slate-900 dark:text-white" style="animation-delay: 0.2s" required>
                    <input type="text" maxlength="1" class="otp-stagger otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none text-slate-900 dark:text-white" style="animation-delay: 0.3s" required>
                    <input type="text" maxlength="1" class="otp-stagger otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none text-slate-900 dark:text-white" style="animation-delay: 0.4s" required>
                    <input type="text" maxlength="1" class="otp-stagger otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none text-slate-900 dark:text-white" style="animation-delay: 0.5s" required>
                    <input type="text" maxlength="1" class="otp-stagger otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none text-slate-900 dark:text-white" style="animation-delay: 0.6s" required>
                </div>
                <input type="text" hidden id="otp" name="otp" value="" >

                <button type="submit" id="btn" class="btn-glow w-full bg-primary hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/40 active:scale-95 transition-all flex items-center justify-center gap-2">
                    Verify Code
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Didn't receive a code? 
                    <button class="text-primary font-bold hover:underline ml-1 transition-all hover:tracking-wide flex items-center gap-1 mx-auto mt-2">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Resend
                    </button>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const themeBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-icon-dark');
        const lightIcon = document.getElementById('theme-icon-light');

        const updateThemeUI = (isDark) => {
            if (isDark) {
                document.documentElement.classList.add('dark');
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
            }
        };

        const initialDark = localStorage.getItem('theme') === 'dark' || 
                         (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
        
        updateThemeUI(initialDark);

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI(isDark);
        });

        // OTP Input Auto-focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

    

        document.getElementById('btn').addEventListener('click', () => {
            let inputs = '';
            document.querySelectorAll('.otp-input').forEach(input => {
                inputs += input.value;
            });
            document.getElementById('otp').value = inputs;
            console.log('OTP Entered:', inputs); 
        });

    </script>
</body>
</html>
